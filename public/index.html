<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aislurp — AI Content Discovery</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- ── Header ──────────────────────────────────────────── -->
  <header class="header">
    <div class="header-inner">
      <div class="brand">
        <span class="brand-icon">⚡</span>
        <div>
          <h1 class="brand-name">Aislurp</h1>
          <p class="brand-tagline">Top AI content, live from the web</p>
        </div>
      </div>

      <div class="header-controls">
        <div class="search-wrap">
          <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M9 3.5a5.5 5.5 0 1 0 0 11 5.5 5.5 0 0 0 0-11ZM2 9a7 7 0 1 1 12.452 4.391l3.328 3.329a.75.75 0 1 1-1.06 1.06l-3.329-3.328A7 7 0 0 1 2 9Z" clip-rule="evenodd"/>
          </svg>
          <input id="search" type="search" placeholder="Search articles &amp; videos…" autocomplete="off" />
        </div>
        <button id="refresh-btn" class="refresh-btn" title="Refresh">
          <svg id="refresh-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M15.312 11.424a5.5 5.5 0 0 1-9.201 2.466l-.312-.311h2.433a.75.75 0 0 0 0-1.5H3.989a.75.75 0 0 0-.75.75v4.242a.75.75 0 0 0 1.5 0v-2.43l.31.31a7 7 0 0 0 11.712-3.138.75.75 0 0 0-1.449-.389Zm1.23-3.723a.75.75 0 0 0 .219-.53V2.929a.75.75 0 0 0-1.5 0V5.36l-.31-.31A7 7 0 0 0 3.239 8.188a.75.75 0 1 0 1.448.389A5.5 5.5 0 0 1 13.89 6.11l.311.31h-2.432a.75.75 0 0 0 0 1.5h4.243a.75.75 0 0 0 .53-.219Z" clip-rule="evenodd"/>
          </svg>
          Refresh
        </button>
      </div>
    </div>

    <!-- Source filter tabs -->
    <div class="filters-wrap">
      <div class="filters" id="source-filters">
        <button class="filter-btn active" data-source="all">All</button>
      </div>
    </div>
  </header>

  <!-- ── Main ────────────────────────────────────────────── -->
  <main class="main">

    <!-- Status bar -->
    <div class="status-bar" id="status-bar">
      <span id="status-text">Loading…</span>
      <span id="fetched-at"></span>
    </div>

    <!-- Article grid -->
    <div class="grid" id="article-grid">
      <!-- Skeleton placeholders while loading -->
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
    </div>

    <!-- Empty / error states -->
    <div class="empty-state" id="empty-state" hidden>
      <span class="empty-icon">🔍</span>
      <p>No articles match your filter.</p>
    </div>

    <div class="error-state" id="error-state" hidden>
      <span class="error-icon">⚠️</span>
      <p id="error-msg">Could not load articles.</p>
      <button class="refresh-btn" id="error-retry">Try again</button>
    </div>

    <!-- ── Videos section ─────────────────────────────────── -->
    <section class="videos-section">

      <div class="section-header">
        <h2 class="section-title">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
            <path d="M3.25 4A2.25 2.25 0 0 0 1 6.25v7.5A2.25 2.25 0 0 0 3.25 16h7.5A2.25 2.25 0 0 0 13 13.75v-7.5A2.25 2.25 0 0 0 10.75 4h-7.5ZM19 4.75a.75.75 0 0 0-1.28-.53l-3 3a.75.75 0 0 0-.22.53v4.5c0 .199.079.39.22.53l3 3a.75.75 0 0 0 1.28-.53V4.75Z" />
          </svg>
          Latest Videos
        </h2>
        <span id="video-status-text" class="video-status"></span>
      </div>

      <div class="filters-wrap">
        <div class="filters" id="video-channel-filters">
          <button class="filter-btn active" data-source="all">All Channels</button>
        </div>
      </div>

      <div class="grid" id="video-grid">
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
      </div>

      <div class="empty-state" id="video-empty-state" hidden>
        <span class="empty-icon">🎬</span>
        <p>No videos match your search.</p>
      </div>

    </section>

  </main>

  <!-- ── Footer ──────────────────────────────────────────── -->
  <footer class="footer">
    <p>Aislurp pulls from <strong>Hacker News</strong>, <strong>Reddit</strong>, <strong>Dev.to</strong>, <strong>Lobsters</strong>, <strong>arXiv</strong>, top AI blogs, and <strong>YouTube</strong> · refreshes on demand</p>
  </footer>

  <script src="article-utils.js"></script>
  <script src="app.js"></script>
</body>
</html>
